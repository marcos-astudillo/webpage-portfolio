  <text x="48" y="178" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">2025-05-17</text>
  <rect x="32" y="202" width="308" height="56" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="48" y="224" font-family="system-ui,sans-serif" font-size="12" fill="#334155">working on new features</text>
  <text x="48" y="242" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">2025-05-17</text>
