  <text x="498" y="132" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">THU</text>
  <text x="524" y="132" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">FRI</text>
  <text x="550" y="132" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">SAT</text>
  <!-- Highlight: day 18 -->
  <rect x="389" y="160" width="20" height="20" rx="10" fill="#3b82f6"/>
  <text x="399" y="174" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">18</text>
  <!-- Row of numbers -->
  <text x="421" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#475569">19</text>
  <text x="447" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#475569">20</text>
  <text x="473" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#475569">21</text>
  <text x="499" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#475569">22</text>
  <text x="525" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#475569">23</text>
  <text x="551" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#475569">24</text>
  <text x="388" y="290" font-family="system-ui,sans-serif" font-size="11" fill="#475569">5/18/2025: 103 words</text>
