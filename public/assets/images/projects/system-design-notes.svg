  <text x="456" y="264" font-family="monospace,sans-serif" font-size="10" fill="#8b949e">## Requirements</text>
  <text x="456" y="280" font-family="monospace,sans-serif" font-size="10" fill="#e6edf3">- 100M URLs/day write, 10B reads</text>
  <text x="456" y="296" font-family="monospace,sans-serif" font-size="10" fill="#8b949e">## Architecture</text>
  <text x="456" y="312" font-family="monospace,sans-serif" font-size="10" fill="#e6edf3">API → Hash service → Redis → DB</text>
