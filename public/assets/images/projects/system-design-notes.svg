  <text x="456" y="360" font-family="monospace,sans-serif" font-size="10" fill="#8b949e">## Trade-offs</text>
  <text x="456" y="376" font-family="monospace,sans-serif" font-size="10" fill="#e6edf3">Base62 vs MD5, Cache TTL strategy</text>
