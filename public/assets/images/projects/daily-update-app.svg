  <text x="652" y="222" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">2025-05-16</text>
  <rect x="636" y="248" width="148" height="172" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="652" y="274" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b">Top 5 Words</text>
  <text x="652" y="292" font-family="system-ui,sans-serif" font-size="10" fill="#475569">1. new (7)</text>
  <text x="652" y="308" font-family="system-ui,sans-serif" font-size="10" fill="#475569">2. posting (6)</text>
  <text x="652" y="324" font-family="system-ui,sans-serif" font-size="10" fill="#475569">3. testing (5)</text>
  <text x="652" y="340" font-family="system-ui,sans-serif" font-size="10" fill="#475569">4. checking (4)</text>
  <!-- Pie chart placeholder -->
  <circle cx="692" cy="396" r="30" fill="#93c5fd" stroke="#fff" stroke-width="2"/>
  <path d="M692 396 L722 396 A30 30 0 0 1 707 422 Z" fill="#3b82f6"/>
  <path d="M692 396 L707 422 A30 30 0 0 1 668 410 Z" fill="#bfdbfe"/>
